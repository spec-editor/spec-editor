# Spec Editor — Dev Docker Compose (hot reload)
#
# For local development with live code changes.
# MCP server: Python with source mounted for hot reload (restart needed).
# Frontend: Next.js dev server with HMR.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Open http://localhost:3000 for the dashboard.
# MCP server available at http://localhost:8088/mcp.

services:
  # Redis (task queue for multi-agent communication)
  redis:
    image: redis:7-alpine
    container_name: spec-editor-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── MCP Server (dev mode) ────────────────────────────────────────────
  mcp:
    image: python:3.12-slim
    container_name: spec-editor-mcp-dev
    ports:
      - "8088:8088"
    working_dir: /app
    volumes:
      - .:/app
      # Optional: mount a project to auto-load
      # - ./my-project:/spec:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "
        pip install . --quiet &&
        python -m src.main mcp --transport http --port 8088
      "
    restart: unless-stopped

  # ── Frontend (dev mode with HMR) ─────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: spec-editor-frontend-dev
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./packages/frontend:/app
    environment:
      - SPEC_MCP_PORT=8088
    depends_on:
      - mcp
    command: >
      sh -c "
        npm install --quiet &&
        npx next dev -p 3000
      "
    restart: unless-stopped

volumes:
  redis_data:
