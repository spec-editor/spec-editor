# Configuration for code generation, testing, and tracing

project:
  name: gen-panel
  root: ./src/
  output_dir: ./generated/

# --- Technology stack ---
stack:
  backend:
    language: python
    framework: FastAPI
    orm: SQLAlchemy
    testing: pytest
  frontend:
    language: typescript
    framework: React
    testing: jest
  database:
    engine: PostgreSQL
    migration_tool: alembic

# --- Mapping: specification element → code ---
codegen:
  annotations: decorator # @implements("REQ-ID")
  ast_parser: stdlib # stdlib.ast | tree-sitter
  mappings:
    module: { type: package }
    component: { template: react_component.tsx.j2 }
    entity: { template: python_sqlalchemy_model.py.j2 }
    api_endpoint: { template: python_fastapi_router.py.j2 }
    field: { template: none }
    test_case: { template: python_pytest.py.j2 }
    user_story: { template: python_pytest_user_story.py.j2 }

# --- Test generation ---
testing:
  mappings:
    module: [smoke]
    component: [unit]
    entity: [unit, migration]
    api_endpoint: [integration]
    test_case: [unit]
    step: [e2e]
  test_artifact:
    fields: [arrange, act, assert]
    link_to: tested_by
    trace: "@tests('REQ-ID')"
  coverage:
    min_line: 80%
    min_branch: 70%
    required_for: [confirmed]

# --- Tracing ---
tracing:
  required_coverage: 0.8
  auto_verify_after: write_code
