# Cloud Token Proxy — Docker Compose (development)

services:
  proxy:
    build: .
    ports:
      - "8089:8089"
    environment:
      - CLOUD_PROXY_REDIS_URL=redis://redis:6379
      - CLOUD_PROXY_LLM_URL=https://api.deepseek.com/v1/chat/completions
      - CLOUD_PROXY_LLM_API_KEY=${DEEPSEEK_API_KEY}
      - CLOUD_PROXY_GUMROAD_SECRET=${GUMROAD_WEBHOOK_SECRET}
      - CLOUD_PROXY_PORT=8089
      - CLOUD_PROXY_WORKERS=2
      - CLOUD_PROXY_TOKEN_PACKS=cloud-tokens-1m:1000000,cloud-tokens-10m:10000000,cloud-tokens-50m:50000000
    volumes:
      - proxy_data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  proxy_data:
  redis_data:
