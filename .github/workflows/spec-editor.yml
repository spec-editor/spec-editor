name: Spec Editor CI

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'aspects/**'
      - 'src/**'
      - 'prompts/**'
  pull_request:
    branches: [main]
    paths:
      - 'source/**'
      - 'aspects/**'
      - 'src/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec-editor
        run: pip install spec-editor

      - name: Validate specification
        run: spec-editor validate -p .
        env:
          SPEC_EDITOR_PROJECT: .

      - name: Check specification metrics
        run: |
          spec-editor status -p . || true

  traceability:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec-editor
        run: pip install spec-editor

      - name: Verify code traceability
        run: spec-editor verify-traceability -p . -c ./src -l python
        continue-on-error: true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(spec-editor status -p . --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('coverage_ratio',0))" || echo "0")
          echo "Coverage: $COVERAGE"
          if [ "$(echo "$COVERAGE < 0.8" | bc)" = "1" ]; then
            echo "::warning::Traceability coverage below 80%: $COVERAGE"
          fi
