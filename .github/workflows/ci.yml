# Spec Editor — Monorepo CI
#
# Runs on every push and PR to main.
# Tests Python core, builds all extensions, verifies frontend.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Python: lint + test
  # ===========================================================================

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
      - name: Coverage report
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=src --cov-report=term --cov-report=xml

  # ===========================================================================
  # VSCode Extension: typecheck + package
  # ===========================================================================

  vscode-extension:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/vscode-extension/package-lock.json
      - name: Install
        working-directory: packages/vscode-extension
        run: npm ci
      - name: TypeScript check
        working-directory: packages/vscode-extension
        run: npx tsc --noEmit
      - name: Package VSIX
        working-directory: packages/vscode-extension
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies
      - name: E2E tests (headless)
        working-directory: packages/vscode-extension
        run: xvfb-run -a npm run test-e2e
        continue-on-error: true
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: packages/vscode-extension/*.vsix

  # ===========================================================================
  # Frontend: build Next.js
  # ===========================================================================

  frontend:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/frontend/package-lock.json
      - name: Install
        working-directory: packages/frontend
        run: npm ci
      - name: Build
        working-directory: packages/frontend
        run: npm run build
      - name: Static export
        working-directory: packages/frontend
        run: npx next export -o out

  # ===========================================================================
  # ZED Extension: compile check
  # ===========================================================================

  zed-extension:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1
      - name: Cargo check
        working-directory: packages/zed-extension
        run: cargo check --target wasm32-wasip1

  # ===========================================================================
  # JetBrains Extension: build (optional — needs JDK 17)
  # ===========================================================================

  jetbrains-extension:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build plugin
        working-directory: packages/jetbrains-extension
        run: ./gradlew buildPlugin --no-daemon

  # ===========================================================================
  # Summary
  # ===========================================================================

  ci-pass:
    needs:
      [test, vscode-extension, frontend, zed-extension, jetbrains-extension]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          for job in test vscode-extension frontend zed-extension jetbrains-extension; do
            result="${{ needs.$job.result }}"
            icon="${{ needs.$job.result == 'success' && '✅' || '❌' }}"
            echo "$icon **$job**: $result" >> $GITHUB_STEP_SUMMARY
          done
