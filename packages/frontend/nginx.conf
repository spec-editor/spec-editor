# Spec Editor Frontend — nginx config
#
# Serves Next.js static export and proxies /api/mcp to the MCP server.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Proxy MCP API to the backend
    location /api/mcp {
        proxy_pass http://mcp:8088/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SSE events proxy
    location /api/events {
        proxy_pass http://mcp:8088/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Static files (Next.js export)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
