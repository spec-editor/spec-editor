# Spec Editor CI — template for YOUR project
# Copy to: your-project/.github/workflows/spec-editor.yml
#
# This workflow validates your specification on every push and PR.
# Requires: source/ directory with requirements, aspects/ with spec.

name: Spec Editor CI

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'aspects/**'
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec-editor
        run: pip install spec-editor

      - name: Validate specification
        run: spec-editor validate -p .

      - name: Check metrics
        run: spec-editor status -p . || true

  traceability:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec-editor
        run: pip install spec-editor

      - name: Verify traceability
        run: spec-editor verify-traceability -p . -c ./src -l python
        continue-on-error: true
